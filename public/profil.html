<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ===== NO CACHE ===== -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <title>Profil - Relasi</title>

    <!-- ===== CSS EKSTERNAL ===== -->
    <link rel="stylesheet" href="/css/style.css" />

    <!-- Google Fonts: Poppins & Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="/firebase-config.js"></script>

    <script>
        // ============================================================
        //  🔥 PROTEKSI: WAJIB LOGIN (PAKAI replace)
        // ============================================================
        firebase.auth().onAuthStateChanged((user) => {
            if (!user) {
                window.location.replace('/login');
            } else {
                loadProfil(user);
            }
        });
    </script>
</head>
<body>

    <div class="app">
        <div class="profil-container">

            <!-- ===== HEADER PROFIL ===== -->
            <div class="profil-header" id="profilHeader">
                <!-- Akan diisi JavaScript -->
            </div>

            <!-- ===== ALERT ===== -->
            <div class="alert-save" id="alertSave"></div>

            <!-- ===== FORM ===== -->
            <form id="formProfil" onsubmit="simpanProfil(event)">
                <div class="form-group">
                    <label>👤 Gender</label>
                    <select id="gender" required>
                        <option value="">Pilih gender</option>
                        <option value="pria">Laki-laki</option>
                        <option value="wanita">Perempuan</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>💞 Status Hubungan</label>
                    <select id="status" required>
                        <option value="">Pilih status</option>
                        <option value="single">Single</option>
                        <option value="pdkt">PDKT</option>
                        <option value="pacaran">Pacaran</option>
                        <option value="tunangan">Tunangan</option>
                        <option value="menikah">Menikah</option>
                    </select>
                </div>

                <button type="submit" class="btn-save" id="btnSave">💾 Simpan Profil</button>
            </form>

            <!-- ===== RIWAYAT LOVE LANGUAGE ===== -->
            <div class="riwayat-section" id="riwayatSection">
                <h3>📊 Riwayat Love Language</h3>
                <div id="riwayatContainer">
                    <p style="color:#8a9e99;font-size:14px;">Belum ada hasil tes.</p>
                </div>
            </div>

            <!-- ===== LOGOUT ===== -->
            <button class="btn-logout" onclick="logoutUser()">🚪 Logout</button>

        </div>

        <!-- ===== BOTTOM NAV ===== -->
        <div class="bottom-nav">
            <a href="/">
                <span class="nav-icon">🏠</span>
                Beranda
            </a>
            <a href="/love-language">
                <span class="nav-icon">❤️</span>
                Love
            </a>
            <a href="/hasil">
                <span class="nav-icon">📊</span>
                Hasil
            </a>
            <a href="/profil" class="active">
                <span class="nav-icon">👤</span>
                Profil
            </a>
        </div>
    </div>

    <script>
        // ============================================================
        //  LOAD PROFIL USER
        // ============================================================
        let currentUser = null;

        function loadProfil(user) {
            currentUser = user;

            // Header
            const header = document.getElementById('profilHeader');
            const foto = user.photoURL || '';
            const nama = user.displayName || 'Pengguna';
            const email = user.email || '';

            header.innerHTML = `
                ${foto ? `<img src="${foto}" class="avatar" />` : `<div class="avatar-placeholder">👤</div>`}
                <h2>${nama}</h2>
                <div class="email">${email}</div>
            `;

            // Ambil data dari Firestore
            const db = firebase.firestore();
            db.collection('users').doc(user.uid).get()
                .then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        document.getElementById('gender').value = data.gender || '';
                        document.getElementById('status').value = data.status || '';
                    }
                })
                .catch((err) => {
                    console.error('Gagal load profil:', err);
                });

            // Tampilkan riwayat Love Language
            tampilkanRiwayat().catch(function(err) {
                console.error('Gagal tampilkan riwayat:', err);
            });
        }

        // ============================================================
        //  TAMPILKAN RIWAYAT LOVE LANGUAGE (Firestore + localStorage)
        // ============================================================
        async function tampilkanRiwayat() {
            const container = document.getElementById('riwayatContainer');
            const db = firebase.firestore();
            const user = firebase.auth().currentUser;

            container.innerHTML = '<p style="color:#b0c2bd;font-size:14px;text-align:center;">⏳ Memuat riwayat...</p>';

            let data = null;
            let tanggal = null;
            let primaryKey = null;

            // ── 1. COBA DARI FIRESTORE ──
            try {
                if (user) {
                    const userDoc = await db.collection('users').doc(user.uid).get();
                    if (userDoc.exists) {
                        const userData = userDoc.data();
                        const ll = userData.loveLanguage;

                        // 1a. all array (5 love language lengkap)
                        if (ll && ll.all && Array.isArray(ll.all) && ll.all.length > 0) {
                            if (!data) data = {};
                            ll.all.forEach(function(item) {
                                if (item.label && item.score !== undefined) {
                                    data[item.label] = item.score;
                                }
                            });
                            if (ll.primary && ll.primary.label && !primaryKey) {
                                primaryKey = ll.primary.label;
                            }
                        }

                        // 1b. direct keys (format lama)
                        if (ll && typeof ll === 'object') {
                            var LL_KEYS = ['Words of Affirmation', 'Acts of Service', 'Quality Time', 'Physical Touch', 'Receiving Gifts'];
                            LL_KEYS.forEach(function(k) {
                                if (ll[k] !== undefined && (!data || !data[k])) {
                                    if (!data) data = {};
                                    data[k] = ll[k];
                                }
                            });
                        }

                        // 1c. primary/secondary objects
                        if (ll && ll.primary && ll.primary.label) {
                            if (!data) data = {};
                            if (!data[ll.primary.label]) {
                                data[ll.primary.label] = ll.primary.score || 0;
                            }
                            if (!primaryKey) primaryKey = ll.primary.label;
                        }
                        if (ll && ll.secondary && ll.secondary.label) {
                            if (!data) data = {};
                            if (!data[ll.secondary.label]) {
                                data[ll.secondary.label] = ll.secondary.score || 0;
                            }
                        }

                        // Tanggal
                        if (!tanggal && userData.updatedAt) {
                            tanggal = userData.updatedAt.toDate ? userData.updatedAt.toDate() : new Date(userData.updatedAt);
                        }
                    }
                }
            } catch (e) {
                console.warn('⚠️ Gagal baca Firestore:', e.message);
            }

            // ── 2. TAMBAHAN DARI LOCALSTORAGE ──
            try {
                const raw = localStorage.getItem('loveLanguageResult');
                if (raw) {
                    const parsed = JSON.parse(raw);
                    if (parsed && typeof parsed === 'object') {
                        if (!data) data = {};

                        // 2a. all array
                        if (parsed.all && Array.isArray(parsed.all)) {
                            parsed.all.forEach(function(item) {
                                if (item.label && item.score !== undefined && !data[item.label]) {
                                    data[item.label] = item.score;
                                }
                            });
                        }

                        // 2b. scores object
                        if (parsed.scores && typeof parsed.scores === 'object') {
                            Object.keys(parsed.scores).forEach(function(k) {
                                if (!data[k]) {
                                    data[k] = parsed.scores[k];
                                }
                            });
                        }

                        // 2c. primary/secondary strings
                        if (parsed.primary && typeof parsed.primary === 'string' && !data[parsed.primary]) {
                            data[parsed.primary] = parsed.scores ? (parsed.scores[parsed.primary] || 50) : 50;
                        }
                        if (parsed.secondary && typeof parsed.secondary === 'string' && !data[parsed.secondary]) {
                            data[parsed.secondary] = parsed.scores ? (parsed.scores[parsed.secondary] || 40) : 40;
                        }

                        if (!primaryKey) primaryKey = parsed.primary || null;
                        if (!tanggal && parsed.tanggal) {
                            tanggal = new Date(parsed.tanggal);
                        }
                    }
                }
            } catch (e) {}

            // ── 3. FILTER: hanya love language keys ──
            var VALID_KEYS = ['Words of Affirmation', 'Acts of Service', 'Quality Time', 'Physical Touch', 'Receiving Gifts'];
            if (data) {
                var cleanData = {};
                VALID_KEYS.forEach(function(k) {
                    if (data[k] !== undefined) {
                        cleanData[k] = data[k];
                    }
                });
                // Fallback: kalau ada extra keys dari primary/secondary strings
                if (Object.keys(cleanData).length === 0) {
                    Object.keys(data).forEach(function(k) {
                        if (VALID_KEYS.indexOf(k) !== -1) {
                            cleanData[k] = data[k];
                        }
                    });
                }
                data = cleanData;
            }

            // ── 3. TIDAK ADA DATA ──
            if (!data || Object.keys(data).length === 0) {
                container.innerHTML = '<p style="color:#b0c2bd;font-size:14px;text-align:center;">📭 Belum ada hasil tes.</p>';
                return;
            }

            // ── 4. RENDER DENGAN ANIMASI ──
            var colors = {
                'Words of Affirmation': '#6c5ce7',
                'Acts of Service': '#00b894',
                'Quality Time': '#d4a373',
                'Physical Touch': '#e17055',
                'Receiving Gifts': '#fd79a8'
            };
            var emoji = {
                'Words of Affirmation': '💬',
                'Acts of Service': '🤝',
                'Quality Time': '⏰',
                'Physical Touch': '🫂',
                'Receiving Gifts': '🎁'
            };

            var sorted = Object.keys(data).sort(function(a, b) {
                return parseInt(data[b]) - parseInt(data[a]);
            });

            if (!primaryKey) primaryKey = sorted[0];

            var html = '';

            // Tanggal
            if (tanggal) {
                html += '<div style="font-size:12px;color:#b0c2bd;margin-bottom:12px;text-align:center;">📅 ' +
                    tanggal.toLocaleDateString('id-ID') + ' · ' +
                    tanggal.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }) +
                    '</div>';
            }

            // Chart bars
            sorted.forEach(function(key, i) {
                var percent = parseInt(data[key]) || 0;
                var color = colors[key] || '#b8a9c9';
                var icon = emoji[key] || '📌';
                var delay = 0.1 + i * 0.1;

                html += '<div class="ll-profil-item" style="animation-delay:' + delay + 's;">';
                html += '  <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0;">';
                html += '    <span style="font-size:16px;">' + icon + '</span>';
                html += '    <span style="font-size:13px;font-weight:500;color:#4a3a40;white-space:nowrap;">' + key + '</span>';
                html += '  </div>';
                html += '  <div class="ll-profil-bar-wrap">';
                html += '    <div class="ll-profil-bar-fill" style="background:' + color + ';" data-width="' + percent + '"></div>';
                html += '  </div>';
                html += '  <span class="ll-profil-percent" data-target="' + percent + '">0%</span>';
                html += '</div>';
            });

            // Primary box
            html += '<div class="ll-profil-primary">';
            html += '  <span style="font-size:12px;color:#8a7a80;">🌟 Love Language Utamamu</span>';
            html += '  <div style="font-size:20px;font-weight:700;color:#e8879f;margin-top:2px;">' +
                (emoji[primaryKey] || '💖') + ' ' + primaryKey +
                ' <small style="font-size:13px;color:#8a7a80;font-weight:400;">· ' + data[primaryKey] + '%</small></div>';
            html += '</div>';

            container.innerHTML = html;

            // ⏱️ Animate bars & counters
            setTimeout(function() {
                var bars = container.querySelectorAll('.ll-profil-bar-fill');
                for (var i = 0; i < bars.length; i++) {
                    bars[i].style.width = bars[i].dataset.width + '%';
                }
                var counters = container.querySelectorAll('.ll-profil-percent');
                for (var j = 0; j < counters.length; j++) {
                    animateLLProfilCounter(counters[j], parseInt(counters[j].dataset.target) || 0);
                }
            }, 300);
        }

        // Helper: counter animasi
        function animateLLProfilCounter(el, target) {
            var start = null;
            var duration = 800;
            function step(ts) {
                if (!start) start = ts;
                var p = Math.min((ts - start) / duration, 1);
                var eased = 1 - Math.pow(1 - p, 3);
                el.textContent = Math.round(target * eased) + '%';
                if (p < 1) requestAnimationFrame(step);
                else el.textContent = target + '%';
            }
            requestAnimationFrame(step);
        }

        // ============================================================
        //  SIMPAN PROFIL KE FIRESTORE
        // ============================================================
        function simpanProfil(e) {
            e.preventDefault();

            const btn = document.getElementById('btnSave');
            const alert = document.getElementById('alertSave');

            btn.disabled = true;
            btn.textContent = '⏳ Menyimpan...';
            alert.className = 'alert-save';
            alert.style.display = 'none';

            const gender = document.getElementById('gender').value;
            const status = document.getElementById('status').value;

            if (!gender || !status) {
                alert.className = 'alert-save error';
                alert.style.display = 'block';
                alert.textContent = '⚠️ Semua field harus diisi!';
                btn.disabled = false;
                btn.textContent = '💾 Simpan Profil';
                return;
            }

            const db = firebase.firestore();
            const user = firebase.auth().currentUser;

            db.collection('users').doc(user.uid).set({
                gender: gender,
                status: status,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true })
            .then(() => {
                // Simpan juga ke localStorage
                localStorage.setItem('userGender', gender);
                localStorage.setItem('userStatus', status);

                alert.className = 'alert-save success';
                alert.style.display = 'block';
                alert.textContent = '✅ Profil berhasil disimpan!';
                btn.disabled = false;
                btn.textContent = '💾 Simpan Profil';

                setTimeout(() => {
                    alert.style.display = 'none';
                }, 3000);
            })
            .catch((err) => {
                alert.className = 'alert-save error';
                alert.style.display = 'block';
                alert.textContent = '❌ Gagal menyimpan: ' + err.message;
                btn.disabled = false;
                btn.textContent = '💾 Simpan Profil';
            });
        }

        // ============================================================
        //  LOGOUT (PAKAI replace)
        // ============================================================
        function logoutUser() {
            if (confirm('Yakin ingin logout?')) {
                firebase.auth().signOut().then(() => {
                    window.location.replace('/');
                });
            }
        }
    </script>

</body>
</html>
