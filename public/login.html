<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Relasi</title>

    <link rel="stylesheet" href="/css/style.css" />

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="/firebase-config.js"></script>
</head>
<body>
    <div style="display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;">
        <div class="login-container">
            <div class="logo">💬</div>
            <h1><strong>Relasi</strong>🌱</h1>
            <p class="subtitle">Grow Closer. Love Better.</p>

            <div class="error-message" id="errorMessage">
                ⚠️ <span id="errorText">Terjadi kesalahan. Silakan coba lagi.</span>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="margin-top:8px;color:#5a6f6a;font-size:14px;">Memproses login...</p>
            </div>

            <button class="btn-google" onclick="loginWithGoogle()" id="btnGoogle">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" style="width:20px;height:20px;" />
                Login dengan Google
            </button>

            <div class="divider">atau</div>

            <button class="btn-email" onclick="alert('🚧 Fitur login email akan segera hadir!')" id="btnEmail">
                📧 Login dengan Email
            </button>

            <div class="footer-text">
                Dengan login, kamu setuju dengan <br />
                <a href="#">Syarat & Ketentuan</a> dan <a href="#">Kebijakan Privasi</a> kami.
            </div>

            <div style="margin-top:16px;font-size:13px;color:#b0c2bd;">
                Belum punya akun? <a href="#" style="color:#3a7d76;font-weight:600;">Daftar di sini</a>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //  CEK LOGIN
        // ============================================================
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                window.location.replace('/');
            }
        });

        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const loading = document.getElementById('loading');
        const btnGoogle = document.getElementById('btnGoogle');
        const btnEmail = document.getElementById('btnEmail');

        function showError(msg) {
            errorText.textContent = msg;
            errorMessage.classList.add('show');
            setTimeout(() => errorMessage.classList.remove('show'), 5000);
        }

        function setLoading(state) {
            if (state) {
                loading.classList.add('show');
                btnGoogle.disabled = true;
                btnEmail.disabled = true;
            } else {
                loading.classList.remove('show');
                btnGoogle.disabled = false;
                btnEmail.disabled = false;
            }
        }

        function loginWithGoogle() {
            setLoading(true);
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider)
                .then((result) => {
                    const user = result.user;
                    if (typeof simpanUser === 'function') simpanUser(user);
                    window.location.href = '/';
                })
                .catch((error) => {
                    setLoading(false);
                    let msg = 'Terjadi kesalahan. Silakan coba lagi.';
                    if (error.code === 'auth/popup-closed-by-user') {
                        msg = 'Popup login ditutup. Silakan coba lagi.';
                    } else if (error.code === 'auth/network-request-failed') {
                        msg = 'Koneksi internet bermasalah. Periksa koneksi kamu.';
                    }
                    showError(msg);
                });
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.querySelector('.login-container').style.opacity = '0';
            document.querySelector('.login-container').style.transform = 'translateY(20px)';
            setTimeout(() => {
                document.querySelector('.login-container').style.transition = 'all 0.6s ease';
                document.querySelector('.login-container').style.opacity = '1';
                document.querySelector('.login-container').style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
</body>
</html>
