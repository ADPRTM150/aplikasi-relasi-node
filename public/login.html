<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Relasi</title>

    <link rel="stylesheet" href="/css/style.css" />

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="/firebase-config.js"></script>
</head>

<body class="login-page">
    <!-- Floating background orbs -->
    <div class="login-orbs">
        <div class="login-orb"></div>
        <div class="login-orb"></div>
        <div class="login-orb"></div>
        <div class="login-orb"></div>
    </div>

    <!-- Floating particles (di-generate JS) -->
    <div id="loginParticles" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;"></div>

    <div class="login-wrapper">
        <div class="login-container" id="loginContainer">
            <span class="logo stagger-item">💬</span>
            <h1 class="stagger-item"><strong>Relasi</strong>🌱</h1>
            <p class="subtitle stagger-item">Grow Closer. Love Better.</p>

            <div class="error-message stagger-item" id="errorMessage">
                ⚠️ <span id="errorText">Terjadi kesalahan. Silakan coba lagi.</span>
            </div>

            <div class="loading stagger-item" id="loading">
                <div class="spinner"></div>
                <p class="loading-text">Memproses login...</p>
            </div>

            <button class="btn-google stagger-item" onclick="loginWithGoogle()" id="btnGoogle">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"
                    class="google-icon" />
                Login dengan Google
            </button>

            <div class="divider stagger-item">atau</div>

            <button class="btn-email stagger-item" onclick="alert('🚧 Fitur login email akan segera hadir!')" id="btnEmail">
                📧 Login dengan Email
            </button>

            <div class="footer-text stagger-item">
                Dengan login, kamu setuju dengan <br />
                <a href="#">Syarat & Ketentuan</a> dan <a href="#">Kebijakan Privasi</a> kami.
            </div>

            <div class="register-link stagger-item">
                Belum punya akun? <a href="#">Daftar di sini</a>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //  CEK LOGIN
        // ============================================================
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                window.location.replace('/');
            }
        });

        // ============================================================
        //  ELEMENTS
        // ============================================================
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const loading = document.getElementById('loading');
        const btnGoogle = document.getElementById('btnGoogle');
        const btnEmail = document.getElementById('btnEmail');
        const loginContainer = document.getElementById('loginContainer');

        // ============================================================
        //  FUNCTIONS
        // ============================================================
        function showError(msg) {
            errorText.textContent = msg;
            errorMessage.classList.add('show');
            setTimeout(() => errorMessage.classList.remove('show'), 5000);
        }

        function setLoading(state) {
            if (state) {
                loading.classList.add('show');
                btnGoogle.disabled = true;
                btnEmail.disabled = true;
            } else {
                loading.classList.remove('show');
                btnGoogle.disabled = false;
                btnEmail.disabled = false;
            }
        }

        function loginWithGoogle() {
            setLoading(true);
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider)
                .then((result) => {
                    const user = result.user;
                    if (typeof simpanUser === 'function') simpanUser(user);
                    window.location.href = '/';
                })
                .catch((error) => {
                    setLoading(false);
                    let msg = 'Terjadi kesalahan. Silakan coba lagi.';
                    if (error.code === 'auth/popup-closed-by-user') {
                        msg = 'Popup login ditutup. Silakan coba lagi.';
                    } else if (error.code === 'auth/network-request-failed') {
                        msg = 'Koneksi internet bermasalah. Periksa koneksi kamu.';
                    } else if (error.code === 'auth/account-exists-with-different-credential') {
                        msg = 'Akun sudah terdaftar dengan metode lain.';
                    }
                    showError(msg);
                });
        }

        // ============================================================
        //  ANIMASI FADE-IN
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                loginContainer.classList.add('visible');
            }, 100);
        });

        // ============================================================
        //  FLOATING PARTICLES
        // ============================================================
        (function createParticles() {
            const container = document.getElementById('loginParticles');
            const emojis = ['🌸', '💕', '✨', '🌿', '🕊️', '💫', '🌷', '🫧'];
            for (let i = 0; i < 15; i++) {
                const particle = document.createElement('span');
                particle.className = 'login-particle';
                particle.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                particle.style.cssText = [
                    'position:absolute',
                    'pointer-events:none',
                    'font-size:' + (12 + Math.random() * 18) + 'px',
                    'left:' + Math.random() * 100 + '%',
                    'animation:particleRise ' + (8 + Math.random() * 12) + 's linear infinite',
                    'animation-delay:' + Math.random() * 10 + 's',
                    'opacity:0'
                ].join(';');
                container.appendChild(particle);
            }
        })();

        // ============================================================
        //  Trigger Logging (hanya jika form email login tersedia)
        // ============================================================
        const loginForm = document.getElementById('loginForm');
        if (loginForm) {
            loginForm.addEventListener('submit', async function (e) {
                e.preventDefault();
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                try {
                    await auth.signInWithEmailAndPassword(email, password);
                    // Logging otomatis di handle oleh auth.onAuthStateChanged
                    window.location.href = '/dashboard';
                } catch (error) {
                    alert('Login gagal: ' + error.message);
                }
            });
        }
    </script>
</body>

</html>
