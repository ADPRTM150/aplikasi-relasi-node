<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Relasi</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #f7f3eb 0%, #e8f0ee 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            max-width: 420px;
            width: 100%;
            background: white;
            border-radius: 30px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(58, 125, 118, 0.12);
            text-align: center;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 8px;
        }

        .login-container h1 {
            font-size: 28px;
            color: #1d3b36;
            font-weight: 300;
            margin-bottom: 4px;
        }

        .login-container h1 strong {
            font-weight: 600;
        }

        .subtitle {
            color: #5a6f6a;
            font-weight: 300;
            margin-bottom: 32px;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 24px 0;
            color: #b0c2bd;
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e0e8e5;
        }

        .btn-google {
            background: white;
            color: #1d3b36;
            border: 2px solid #e0e8e5;
            padding: 14px 24px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .btn-google:hover {
            border-color: #3a7d76;
            background: #f8fbfa;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(58, 125, 118, 0.10);
        }

        .btn-google img {
            width: 20px;
            height: 20px;
        }

        .btn-email {
            background: #3a7d76;
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .btn-email:hover {
            background: #2d655f;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(58, 125, 118, 0.15);
        }

        .footer-text {
            margin-top: 24px;
            font-size: 13px;
            color: #8a9e99;
            line-height: 1.6;
        }

        .footer-text a {
            color: #3a7d76;
            text-decoration: none;
            font-weight: 600;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: #fdf0ee;
            color: #e17055;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 14px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .loading {
            display: none;
            margin: 16px 0;
        }

        .loading.show {
            display: block;
        }

        .loading .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #f0f7f5;
            border-top: 3px solid #3a7d76;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }
            .login-container h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <!-- Logo -->
        <div class="logo">💑</div>
        <h1><strong>Relasi</strong>🌱</h1>
        <p class="subtitle">Grow Closer. Love Better.</p>

        <!-- Error Message -->
        <div class="error-message" id="errorMessage">
            ⚠️ <span id="errorText">Terjadi kesalahan. Silakan coba lagi.</span>
        </div>

        <!-- Loading -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top:8px;color:#5a6f6a;font-size:14px;">Memproses login...</p>
        </div>

        <!-- Tombol Login Google -->
        <button class="btn-google" onclick="loginWithGoogle()" id="btnGoogle">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
            Login dengan Google
        </button>

        <div class="divider">atau</div>

        <!-- Tombol Login Email (Nanti bisa dikembangkan) -->
        <button class="btn-email" onclick="alert('🚧 Fitur login email akan segera hadir!')" id="btnEmail">
            📧 Login dengan Email
        </button>

        <!-- Footer -->
        <div class="footer-text">
            Dengan login, kamu setuju dengan <br />
            <a href="#">Syarat & Ketentuan</a> dan <a href="#">Kebijakan Privasi</a> kami.
        </div>

        <div style="margin-top:16px;font-size:13px;color:#b0c2bd;">
            Belum punya akun? <a href="#" style="color:#3a7d76;font-weight:600;">Daftar di sini</a>
        </div>
    </div>

    <script>
        // ============================================================
        //  FUNGSI LOGIN
        // ============================================================
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const loading = document.getElementById('loading');
        const btnGoogle = document.getElementById('btnGoogle');
        const btnEmail = document.getElementById('btnEmail');

        function showError(msg) {
            errorText.textContent = msg;
            errorMessage.classList.add('show');
            setTimeout(() => errorMessage.classList.remove('show'), 5000);
        }

        function setLoading(state) {
            if (state) {
                loading.classList.add('show');
                btnGoogle.disabled = true;
                btnEmail.disabled = true;
            } else {
                loading.classList.remove('show');
                btnGoogle.disabled = false;
                btnEmail.disabled = false;
            }
        }

        function loginWithGoogle() {
            setLoading(true);
            const provider = new firebase.auth.GoogleAuthProvider();

            firebase.auth().signInWithPopup(provider)
                .then((result) => {
                    // Login sukses
                    const user = result.user;
                    console.log('Login berhasil:', user.displayName);

                    // Simpan user ke Firestore (jika ada fungsi simpanUser)
                    if (typeof simpanUser === 'function') {
                        simpanUser(user);
                    }

                    // Redirect ke beranda
                    window.location.href = 'index.html';
                })
                .catch((error) => {
                    setLoading(false);
                    console.error('Login error:', error);

                    let msg = 'Terjadi kesalahan. Silakan coba lagi.';
                    if (error.code === 'auth/popup-closed-by-user') {
                        msg = 'Popup login ditutup. Silakan coba lagi.';
                    } else if (error.code === 'auth/network-request-failed') {
                        msg = 'Koneksi internet bermasalah. Periksa koneksi kamu.';
                    }
                    showError(msg);
                });
        }

        // ============================================================
        //  CEK STATUS LOGIN (Jika sudah login, langsung redirect)
        // ============================================================
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                // Jika sudah login, langsung ke beranda
                window.location.href = 'index.html';
            }
        });

        // ============================================================
        //  TAMPILAN AWAL - ANIMASI SEDIKIT
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            // Efek fade in
            document.querySelector('.login-container').style.opacity = '0';
            document.querySelector('.login-container').style.transform = 'translateY(20px)';
            setTimeout(() => {
                document.querySelector('.login-container').style.transition = 'all 0.6s ease';
                document.querySelector('.login-container').style.opacity = '1';
                document.querySelector('.login-container').style.transform = 'translateY(0)';
            }, 100);
        });
    </script>

</body>
</html>
