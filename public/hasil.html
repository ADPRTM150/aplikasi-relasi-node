<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- ===== DI BAGIAN <head> ===== -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Hasil Love Language</title>

    <link rel="stylesheet" href="/css/style.css" />

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="/firebase-config.js"></script>
    
    <script>
        firebase.auth().onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = '/login';
            }
        });
    </script>

<!-- ===== DI BAGIAN <script> PALING ATAS ===== -->
    <script>
        // 🔥 PROTEKSI: CEK LOGIN, REDIRECT DENGAN replace()
        firebase.auth().onAuthStateChanged((user) => {
            if (!user) {
                window.location.replace('/login');
            }
        });
    </script>

</head>
<body>
    <div class="app">
        <div class="card" style="background:white;border-radius:20px;padding:30px 25px;box-shadow:0 8px 30px rgba(58,125,118,0.08);border:1px solid rgba(58,125,118,0.06);margin-bottom:16px;">
            <h1 style="font-size:26px;font-weight:300;color:#1d3b36;margin-bottom:6px;">📊 <strong>Hasil</strong> Love Language</h1>
            <div style="color:#5a6f6a;font-weight:300;margin-bottom:20px;">Lihat hasil tes terakhirmu di sini</div>

            <div id="hasilContainer">
                <!-- Akan diisi JavaScript -->
            </div>

            <div style="display:flex;gap:12px;margin-top:20px;flex-wrap:wrap;">
                <a href="/love-language" style="flex:1;min-width:120px;text-align:center;background:#3a7d76;color:white;border:none;padding:14px 32px;border-radius:50px;font-size:16px;font-weight:600;cursor:pointer;transition:0.2s;text-decoration:none;">🔄 Tes Ulang</a>
                <a href="/" style="flex:1;min-width:120px;text-align:center;background:transparent;color:#3a7d76;border:2px solid #3a7d76;padding:14px 32px;border-radius:50px;font-size:16px;font-weight:600;cursor:pointer;transition:0.2s;text-decoration:none;">🏠 Beranda</a>
            </div>
        </div>

        <div class="bottom-nav">
            <a href="/">
                <span class="nav-icon">🏠</span>
                Beranda
            </a>
            <a href="/love-language">
                <span class="nav-icon">❤️</span>
                Love
            </a>
            <a href="/hasil" class="active">
                <span class="nav-icon">📊</span>
                Hasil
            </a>
            <a href="/profil">
    <span class="nav-icon">👤</span>
    Profil
</a>
        </div>
    </div>

    <script>
        function tampilkanHasil() {
            const container = document.getElementById('hasilContainer');
            const rawData = localStorage.getItem('loveLanguageResult');
            const date = localStorage.getItem('loveLanguageDate');

            if (!rawData) {
                container.innerHTML = `
                    <div style="text-align:center;padding:40px 20px;color:#5a6f6a;">
                        <div style="font-size:56px;margin-bottom:12px;">📭</div>
                        <h3 style="color:#1d3b36;margin-bottom:8px;">Belum Ada Hasil</h3>
                        <p style="color:#5a6f6a;">Kamu belum menyelesaikan tes Love Language.</p>
                        <a href="/love-language" style="display:inline-block;margin-top:16px;background:#3a7d76;color:white;padding:14px 32px;border-radius:50px;text-decoration:none;font-weight:600;">Mulai Tes →</a>
                    </div>
                `;
                return;
            }

            try {
                const data = JSON.parse(rawData);
                const sorted = Object.keys(data).sort((a, b) => parseInt(data[b]) - parseInt(data[a]));

                const colors = {
                    'Words of Affirmation': '#6c5ce7',
                    'Acts of Service': '#00b894',
                    'Quality Time': '#d4a373',
                    'Physical Touch': '#e17055',
                    'Receiving Gifts': '#fd79a8'
                };
                const emoji = {
                    'Words of Affirmation': '💬',
                    'Acts of Service': '🤝',
                    'Quality Time': '⏰',
                    'Physical Touch': '🫂',
                    'Receiving Gifts': '🎁'
                };

                let html = '';
                if (date) {
                    const d = new Date(date);
                    html += `<div style="font-size:13px;color:#8a9e99;margin-bottom:16px;">📅 Terakhir dikerjakan: ${d.toLocaleDateString('id-ID')} ${d.toLocaleTimeString('id-ID', {hour:'2-digit',minute:'2-digit'})}</div>`;
                }

                sorted.forEach(key => {
                    const percent = parseInt(data[key]);
                    const color = colors[key] || '#3a7d76';
                    const emojiIcon = emoji[key] || '';
                    html += `
                        <div class="chart-item">
                            <div class="label">${emojiIcon} ${key}</div>
                            <div class="bar-bg">
                                <div class="bar-fill" style="width:0%;background:${color};" data-width="${percent}"></div>
                            </div>
                            <div class="percent">${percent}%</div>
                        </div>
                    `;
                });

                const topKey = sorted[0];
                html += `
                    <div style="margin-top:20px;padding:16px;background:#f0f7f5;border-radius:14px;text-align:center;">
                        <div style="font-size:14px;color:#5a6f6a;">🌟 Love Language Utamamu</div>
                        <div style="font-size:24px;font-weight:600;color:#1d3b36;margin-top:4px;">
                            ${emoji[topKey] || ''} ${topKey}
                        </div>
                        <div style="font-size:14px;color:#5a6f6a;margin-top:2px;">${data[topKey]}%</div>
                    </div>
                `;

                container.innerHTML = html;

                setTimeout(() => {
                    document.querySelectorAll('.bar-fill').forEach(el => {
                        el.style.width = el.dataset.width + '%';
                    });
                }, 300);

            } catch (e) {
                container.innerHTML = `<div style="text-align:center;padding:40px 20px;color:#5a6f6a;"><div style="font-size:56px;margin-bottom:12px;">⚠️</div><h3 style="color:#1d3b36;margin-bottom:8px;">Data Error</h3><p>Ada masalah dengan data yang tersimpan.</p></div>`;
            }
        }

        tampilkanHasil();

        window.addEventListener('storage', (e) => {
            if (e.key === 'loveLanguageResult') {
                tampilkanHasil();
            }
        });
    </script>
</body>
</html>
