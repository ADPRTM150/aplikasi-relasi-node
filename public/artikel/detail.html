<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="light only" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Baca Artikel - Relasi</title>

    <!-- ===== CSS ===== -->
    <link rel="stylesheet" href="/css/style.css" />

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="/firebase-config.js"></script>
</head>

<body>

    <div class="app">

        <!-- ===== HEADER ===== -->
        <div class="header">
            <div class="logo"><strong>Relasi</strong>🌱</div>
            <div style="display:flex;align-items:center;gap:10px;">
                <span class="badge">Beta</span>
                <div class="user-area" id="userArea">
                    <!-- Akan diisi JavaScript -->
                </div>
            </div>
        </div>

        <!-- ===== KONTEN DETAIL ===== -->
        <div class="artikel-detail" id="detailContainer">
            <a href="/artikel" class="back-link" onclick="kembaliKeArtikel(event)">← Kembali ke Artikel</a>
            <div id="artikelContent">
                <div class="loading-text">⏳ Memuat artikel...</div>
            </div>
        </div>

        <!-- ===== BOTTOM NAV ===== -->
        <div class="bottom-nav">
            <a href="/">
                <span class="nav-icon">🏠</span>
                Beranda
            </a>
            <a href="/love-language">
                <span class="nav-icon">❤️</span>
                Love
            </a>
            <a href="/relationship-check">
                <span class="nav-icon">💕</span>
                Health
            </a>
            <a href="/artikel" class="active">
                <span class="nav-icon">📰</span>
                Artikel
            </a>
        </div>

    </div>

    <script>
        // ============================================================
        //  FIREBASE AUTH - RENDER USER
        // ============================================================
        firebase.auth().onAuthStateChanged(function(user) {
            var userArea = document.getElementById('userArea');
            if (user) {
                var foto = user.photoURL || '';
                var nama = user.displayName || 'Pengguna';
                userArea.innerHTML = `
                    <button class="profile-trigger" onclick="toggleDropdown()">
                        ${foto ? `<img src="${foto}" class="avatar" />` : `<div class="avatar-placeholder">👤</div>`}
                    </button>
                    <div class="user-dropdown" id="userDropdown">
                        <a href="/profil" class="dropdown-item">👤 Profil</a>
                        <a href="/hasil" class="dropdown-item">📊 Hasil</a>
                        <a href="/love-language" class="dropdown-item">❤️ Love Language</a>
                        <a href="/relationship-check" class="dropdown-item">💕 Health Check</a>
                        <a href="/artikel" class="dropdown-item">📰 Artikel</a>
                        <div class="dropdown-divider"></div>
                        <button class="dropdown-item logout" onclick="logout()">🚪 Logout</button>
                    </div>
                `;
            } else {
                userArea.innerHTML = `
                    <button class="profile-trigger" onclick="window.location.href='/login'">
                        <div class="avatar-placeholder">👤</div>
                    </button>
                `;
            }
        });

        function toggleDropdown() {
            var d = document.getElementById('userDropdown');
            if (d) d.classList.toggle('show');
        }

        document.addEventListener('click', function(e) {
            var area = document.getElementById('userArea');
            if (area && !area.contains(e.target)) {
                var d = document.getElementById('userDropdown');
                if (d) d.classList.remove('show');
            }
        });

        function logout() {
            if (confirm('Yakin ingin logout?')) {
                // ============================================
                //  🔥 LOG LOGOUT SEBELUM SIGNOUT
                // ============================================
                if (window.logUserLogout) {
                    window.logUserLogout().then(function() {
                        firebase.auth().signOut().then(function() {
                            window.location.reload();
                        });
                    }).catch(function() {
                        firebase.auth().signOut().then(function() {
                            window.location.reload();
                        });
                    });
                } else {
                    firebase.auth().signOut().then(function() {
                        window.location.reload();
                    });
                }
            }
        }

        // ============================================================
        //  🔥 KEMBALI KE ARTIKEL (TANPA MENYIMPAN HISTORY)
        // ============================================================
        function kembaliKeArtikel(e) {
            e.preventDefault();
            window.location.replace('/artikel');
        }

        // ============================================================
        //  🔥 AMBIL DETAIL ARTIKEL DARI FIRESTORE
        // ============================================================
        async function loadArticleDetail() {
            var container = document.getElementById('artikelContent');

            var urlParams = new URLSearchParams(window.location.search);
            var articleId = urlParams.get('id');

            if (!articleId) {
                container.innerHTML = `
                    <div class="error-state">
                        <div class="icon">⚠️</div>
                        <p>Artikel tidak ditemukan.</p>
                    </div>
                `;
                return;
            }

            try {
                var doc = await db.collection('articles').doc(articleId).get();

                if (!doc.exists) {
                    container.innerHTML = `
                        <div class="error-state">
                            <div class="icon">📭</div>
                            <p>Artikel tidak ditemukan.</p>
                        </div>
                    `;
                    return;
                }

                var a = doc.data();
                var tanggal = a.createdAt ? new Date(a.createdAt.toDate()).toLocaleDateString('id-ID', {
                    day: 'numeric',
                    month: 'long',
                    year: 'numeric'
                }) : '-';

                container.innerHTML = `
                    <div class="thumb">${a.thumb || '📰'}</div>
                    <span class="kategori">${a.category || 'Lainnya'}</span>
                    <h1>${a.title}</h1>
                    <div class="meta">📅 ${tanggal}</div>
                    <div class="content">${a.content || 'Konten belum tersedia.'}</div>
                `;

                document.title = a.title + ' - Relasi';

                // ============================================================
                //  🔥 LOG AKTIVITAS BACA ARTIKEL - DIPANGGIL DI SINI!
                // ============================================================
                await trackArticleRead(articleId, a.title, a.category);

            } catch (error) {
                console.error('Error loading article detail:', error);
                container.innerHTML = `
                    <div class="error-state">
                        <div class="icon">❌</div>
                        <p>Gagal memuat artikel. Silakan refresh halaman.</p>
                    </div>
                `;
            }
        }

        // ============================================================
        //  🔥 FUNGSI TRACK ARTICLE READ - DENGAN LOGGING
        // ============================================================
        async function trackArticleRead(articleId, articleTitle, category) {
            try {
                // Cek apakah user login
                var user = firebase.auth().currentUser;
                if (!user) {
                    console.log('⚠️ User tidak login, skip logging');
                    return;
                }

                // Ambil nama user dari Firestore
                var userName = 'Pengguna';
                try {
                    var userDoc = await db.collection('users').doc(user.uid).get();
                    if (userDoc.exists) {
                        var userData = userDoc.data();
                        userName = userData.nama || userData.name || user.displayName || 'Pengguna';
                    }
                } catch (e) {
                    userName = user.displayName || user.email || 'Pengguna';
                }

                // Data aktivitas
                var activityData = {
                    userId: user.uid,
                    userEmail: user.email || '-',
                    userName: userName,
                    type: 'article_read',
                    icon: '📖',
                    priority: 'normal',
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    details: {
                        articleId: articleId || 'unknown',
                        articleTitle: articleTitle || 'Artikel',
                        category: category || 'Lainnya'
                    }
                };

                // Simpan ke Firestore
                await db.collection('activities').add(activityData);
                console.log('✅ Article read activity logged! -', userName);

            } catch (error) {
                console.error('❌ Error tracking article:', error);
            }
        }

        // ============================================================
        //  🔥 INIT - LOAD ARTICLE
        // ============================================================
        loadArticleDetail();

        console.log('✅ Article detail page loaded with activity logging!');
    </script>

</body>

</html>
